name: Verify

on:
  push:

concurrency:
  group: verify
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  quality:
    name: Quality (${{ matrix.check }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        check: [test, lint, type-check]

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: nci

      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            test)       nr test ;;
            lint)       nr lint ;;
            type-check) nr type-check ;;
          esac

